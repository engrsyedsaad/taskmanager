<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <nav class="nav">
            <h1>Task Manager</h1>
            <button class="createbtn">Create</button>
        </nav>
        <section class="task-div">
            <div class="task">
                <h3>Task Title </h3>
                <h4>Piroirty:high</h4>
                <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Dolorem laudantium nesciunt inventore,
                    ullam beatae reiciendis ad distinctio similique eveniet exercitationem, animi quia, culpa ab et!
                    Possimus repellendus aliquam nihil fuga!</p>
                <div class="btndiv">
                    <button class="button edit">edit</button>
                    <button class="complete button">Complete</button>
                    <button class="button del">delete</button>
                </div>
            </div>
        </section>
        <section class="create">
            <div class="close">
                <div></div>
                <h2 class="closebtn">X</h2>
            </div>
            <div class="createitem">
                <form>
                    <input type="text" placeholder="Enter Task Tile">
                    <input type="text" placeholder="Enter Task Decsription">
                    <label for="pi">Pirority</label>
                    <div>
                        <input type="radio" name="pi" value="high" id="high">
                        <label for="high">High</label>

                        <input type="radio" name="pi" value="medium" id="medium">
                        <label for="medium">Medium</label>

                        <input type="radio" name="pi" value="low" id="low">
                        <label for="low">Low</label>
                    </div>

                    <button>Submit</button>
                </form>

            </div>
        </section>


    </main>






    <script src="script.js"></script>
</body>

</html>
